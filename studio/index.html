<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio | Canvas by Heart</title>
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/apple-touch-icon.png">
  <link rel="shortcut icon" href="../images/favicon.ico">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="admin.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Dancing+Script:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <div id="login-container" class="container">
    <div class="card login-card">
      <div class="title-decorative">
        <div class="brush-stroke" style="width: 40px;"></div>
        <h2 style="font-size: 2rem;">Studio Login</h2>
        <div class="brush-stroke" style="width: 40px;"></div>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="cta primary" style="width: 100%; margin-top: 1rem;">Login <i
            class="fas fa-arrow-right"></i></button>
        <p id="login-error" class="error"></p>
      </form>
    </div>
  </div>

  <div id="dashboard-container" class="container hidden">
    <div class="admin-header">
      <div class="title-decorative">
        <div class="brush-stroke"></div>
        <h2>Studio Dashboard</h2>
        <div class="brush-stroke"></div>
      </div>
      <button id="logout-btn" class="cta secondary" style="margin-top: 0; padding: 0.5rem 1.5rem;">Logout</button>
    </div>

    <div class="actions-panel">
      <div class="card upload-card">
        <h3>Upload New Art</h3>
        <form id="upload-form">
          <div class="form-group">
            <label for="art-title">Title</label>
            <input type="text" id="art-title" placeholder="e.g. Morning Dew" required>
          </div>
          <div class="form-group">
            <label for="art-image">Media File</label>
            <input type="file" id="art-image" accept="image/*,video/*" required>
          </div>
          <div class="form-group">
            <label for="art-order">Sort Order (Optional)</label>
            <input type="number" id="art-order" placeholder="e.g. 1 (1 is First)" value="1">
          </div>
          <button type="submit" class="cta primary" id="upload-btn" style="width: 100%; margin-top: 1rem;">Upload to
            R2</button>
        </form>
      </div>

      <div class="card sync-card">
        <h3>Sync Items</h3>
        <p>If you've recreated the SQLite database or manually added files to R2, click below to sync.</p>
        <button id="sync-btn" class="cta secondary" style="width: 100%; margin-top: 1rem;"><i
            class="fas fa-sync-alt"></i> Sync from R2</button>
      </div>
    </div>

    <div class="gallery-management">
      <div class="title-decorative" style="margin-top: 3rem;">
        <div class="brush-stroke"></div>
        <h2>Manage Gallery</h2>
        <div class="brush-stroke"></div>
      </div>

      <h3 class="section-subtitle">Images</h3>
      <div id="images-grid" class="items-grid">
        <p>Loading images...</p>
      </div>

      <h3 class="section-subtitle">Videos</h3>
      <div id="videos-grid" class="items-grid">
        <p>Loading videos...</p>
      </div>
    </div>
  </div>


  <footer>
    © <span id="year"></span> Chanchal Gupta — Canvas by Heart
  </footer>

  <script src="admin.js"></script>
</body>

</html>
